<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Điện - EVN Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
        body.theme-1{--bg-page:#060a18;--bg-card:rgba(15,20,45,.97);--bg-glass:rgba(255,255,255,.04);--bg-glass-hover:rgba(255,255,255,.07);--bg-header:linear-gradient(135deg,rgba(0,80,200,.25),rgba(0,180,255,.12));--bg-controls:rgba(8,12,30,.9);--bg-table-head:rgba(0,100,220,.15);--bg-table-row:rgba(255,255,255,.025);--bg-table-row-alt:rgba(0,100,255,.05);--bg-loss:rgba(255,200,50,.07);--accent:#00b4ff;--accent2:#7c3aed;--accent-glow:rgba(0,180,255,.35);--color-title:#00d4ff;--color-final:#ff4466;--color-grand:#ff3355;--color-text:#c8d8f0;--color-text-dim:rgba(200,216,240,.5);--color-loss-text:#fbbf24;--border-color:rgba(0,180,255,.18);--border-accent:rgba(0,180,255,.45);--gradient-border:linear-gradient(135deg,#00b4ff,#7c3aed,#ff4466,#00b4ff)}
        body.theme-2{--bg-page:#eef2ff;--bg-card:rgba(255,255,255,.98);--bg-glass:rgba(26,92,184,.05);--bg-glass-hover:rgba(26,92,184,.09);--bg-header:linear-gradient(135deg,rgba(26,92,184,.1),rgba(86,180,224,.06));--bg-controls:rgba(235,242,255,.95);--bg-table-head:rgba(26,92,184,.08);--bg-table-row:rgba(255,255,255,.85);--bg-table-row-alt:rgba(235,245,255,.85);--bg-loss:rgba(255,240,180,.5);--accent:#1a5cb8;--accent2:#2980b9;--accent-glow:rgba(26,92,184,.25);--color-title:#1a5cb8;--color-final:#c0000a;--color-grand:#c0000a;--color-text:#1a2a4a;--color-text-dim:rgba(26,42,74,.5);--color-loss-text:#7a5900;--border-color:rgba(26,92,184,.15);--border-accent:rgba(26,92,184,.4);--gradient-border:linear-gradient(135deg,#1a5cb8,#56b4e0,#2980b9,#1a5cb8)}
        body.theme-3{--bg-page:#020d05;--bg-card:rgba(4,18,8,.97);--bg-glass:rgba(0,255,100,.04);--bg-glass-hover:rgba(0,255,100,.08);--bg-header:linear-gradient(135deg,rgba(0,180,50,.18),rgba(0,255,100,.07));--bg-controls:rgba(3,14,6,.9);--bg-table-head:rgba(0,200,80,.1);--bg-table-row:rgba(0,255,80,.025);--bg-table-row-alt:rgba(0,200,60,.055);--bg-loss:rgba(0,200,80,.07);--accent:#00e676;--accent2:#69f0ae;--accent-glow:rgba(0,230,118,.35);--color-title:#00e676;--color-final:#69f0ae;--color-grand:#00e676;--color-text:#b0f0c8;--color-text-dim:rgba(176,240,200,.5);--color-loss-text:#69f0ae;--border-color:rgba(0,200,80,.18);--border-accent:rgba(0,230,118,.45);--gradient-border:linear-gradient(135deg,#00e676,#69f0ae,#00c853,#00e676)}
        body.theme-4{--bg-page:#100200;--bg-card:rgba(22,4,0,.97);--bg-glass:rgba(255,80,0,.04);--bg-glass-hover:rgba(255,80,0,.08);--bg-header:linear-gradient(135deg,rgba(200,50,0,.2),rgba(255,140,0,.09));--bg-controls:rgba(18,4,0,.9);--bg-table-head:rgba(200,50,0,.12);--bg-table-row:rgba(255,60,0,.025);--bg-table-row-alt:rgba(255,100,0,.055);--bg-loss:rgba(255,150,0,.07);--accent:#ff6b35;--accent2:#ffd700;--accent-glow:rgba(255,107,53,.35);--color-title:#ff8c42;--color-final:#ffd700;--color-grand:#ff4500;--color-text:#ffe0c8;--color-text-dim:rgba(255,224,200,.5);--color-loss-text:#ffd700;--border-color:rgba(255,100,0,.18);--border-accent:rgba(255,107,53,.45);--gradient-border:linear-gradient(135deg,#ff4500,#ff8c00,#ffd700,#ff4500)}
        body.theme-5{--bg-page:#07000f;--bg-card:rgba(14,0,28,.97);--bg-glass:rgba(160,0,255,.04);--bg-glass-hover:rgba(160,0,255,.08);--bg-header:linear-gradient(135deg,rgba(120,0,200,.2),rgba(200,100,255,.09));--bg-controls:rgba(10,0,20,.9);--bg-table-head:rgba(140,0,220,.12);--bg-table-row:rgba(160,0,255,.025);--bg-table-row-alt:rgba(120,0,200,.06);--bg-loss:rgba(160,100,255,.07);--accent:#c084fc;--accent2:#e056fd;--accent-glow:rgba(192,132,252,.35);--color-title:#c084fc;--color-final:#f0abfc;--color-grand:#e040fb;--color-text:#e8d0ff;--color-text-dim:rgba(232,208,255,.5);--color-loss-text:#f0abfc;--border-color:rgba(160,0,255,.18);--border-accent:rgba(192,132,252,.45);--gradient-border:linear-gradient(135deg,#9b59b6,#e056fd,#a29bfe,#c084fc)}
        body.theme-6{--bg-page:#001a2e;--bg-card:rgba(0,20,45,.97);--bg-glass:rgba(0,255,200,.04);--bg-glass-hover:rgba(0,255,200,.08);--bg-header:linear-gradient(135deg,rgba(0,150,180,.2),rgba(0,255,200,.08));--bg-controls:rgba(0,15,35,.9);--bg-table-head:rgba(0,180,160,.12);--bg-table-row:rgba(0,255,200,.025);--bg-table-row-alt:rgba(0,200,160,.055);--bg-loss:rgba(0,200,160,.07);--accent:#00ffcc;--accent2:#0096ff;--accent-glow:rgba(0,255,200,.35);--color-title:#00ffcc;--color-final:#00d4ff;--color-grand:#00ffcc;--color-text:#b0ffe8;--color-text-dim:rgba(176,255,232,.5);--color-loss-text:#00ffcc;--border-color:rgba(0,200,160,.18);--border-accent:rgba(0,255,200,.45);--gradient-border:linear-gradient(135deg,#00ffcc,#0096ff,#00e5ff,#00ffcc)}
        body.theme-7{--bg-page:#1a0a00;--bg-card:rgba(32,14,0,.97);--bg-glass:rgba(255,180,0,.04);--bg-glass-hover:rgba(255,180,0,.08);--bg-header:linear-gradient(135deg,rgba(200,120,0,.2),rgba(255,200,50,.08));--bg-controls:rgba(20,10,0,.9);--bg-table-head:rgba(180,100,0,.12);--bg-table-row:rgba(255,180,0,.025);--bg-table-row-alt:rgba(200,130,0,.055);--bg-loss:rgba(255,200,50,.07);--accent:#ffb300;--accent2:#ff6f00;--accent-glow:rgba(255,179,0,.35);--color-title:#ffd740;--color-final:#ffab40;--color-grand:#ffb300;--color-text:#fff3cd;--color-text-dim:rgba(255,243,205,.5);--color-loss-text:#ffd740;--border-color:rgba(255,160,0,.18);--border-accent:rgba(255,179,0,.45);--gradient-border:linear-gradient(135deg,#ffb300,#ff6f00,#ffd740,#ffb300)}
        body.theme-8{--bg-page:#0a0a0a;--bg-card:rgba(18,18,18,.97);--bg-glass:rgba(255,255,255,.04);--bg-glass-hover:rgba(255,255,255,.08);--bg-header:linear-gradient(135deg,rgba(80,80,80,.2),rgba(150,150,150,.08));--bg-controls:rgba(10,10,10,.9);--bg-table-head:rgba(100,100,100,.12);--bg-table-row:rgba(255,255,255,.025);--bg-table-row-alt:rgba(255,255,255,.045);--bg-loss:rgba(200,200,200,.06);--accent:#e0e0e0;--accent2:#9e9e9e;--accent-glow:rgba(220,220,220,.25);--color-title:#fff;--color-final:#e0e0e0;--color-grand:#fff;--color-text:#ccc;--color-text-dim:rgba(200,200,200,.5);--color-loss-text:#bdbdbd;--border-color:rgba(150,150,150,.18);--border-accent:rgba(220,220,220,.35);--gradient-border:linear-gradient(135deg,#fff,#9e9e9e,#fff,#bdbdbd)}

        body{font-family:'Be Vietnam Pro','Times New Roman',sans-serif;background:var(--bg-page);min-height:100vh;display:flex;justify-content:center;padding:20px 10px 40px;overflow-x:hidden;transition:background .5s;position:relative}
        .app-wrapper{position:relative;z-index:1;max-width:1280px;width:100%}

        /* RAINBOW WRAPPER */
        @property --rb-angle{syntax:'<angle>';initial-value:0deg;inherits:false}
        .rainbow-wrapper{position:relative;border-radius:20px;overflow:hidden;padding:4px;background:transparent;transition:padding .3s}
        .rainbow-wrapper .rb-spin{position:absolute;inset:-150%;width:400%;height:400%;background:conic-gradient(#ff0000 0deg,#ff7f00 51deg,#ffff00 102deg,#00cc00 153deg,#0000ff 204deg,#8b00ff 255deg,#ff00cc 306deg,#ff0000 360deg);animation:rbRotate 2s linear infinite;pointer-events:none;z-index:0}
        .rainbow-wrapper .rb-inner{position:absolute;inset:4px;border-radius:17px;background:var(--bg-page,#060a18);z-index:0;transition:background .5s}
        @keyframes rbRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .main-card{background:var(--bg-card);border-radius:18px;position:relative;z-index:1;overflow:hidden;transition:background .4s}

        .header-banner{background:var(--bg-header);border-bottom:1px solid var(--border-color);padding:24px 28px 20px;text-align:center;position:relative}
        .header-title{font-family:'Orbitron',monospace;font-size:clamp(16px,2.5vw,24px);font-weight:900;color:var(--color-title);letter-spacing:2px;text-shadow:0 0 20px var(--accent-glow)}
        
        /* FIX ẨNH BỂ CHO IPHONE */
        .img-container{display:flex;flex-direction:column;align-items:center;gap:3px;min-height:44px;justify-content:center;position:relative}
        .img-preview{display:none;width:44px;height:44px;object-fit:cover;border-radius:8px;border:2px solid var(--border-color);cursor:pointer}
        .img-preview.has-src{display:block!important} /* Chỉ hiện khi có class này */
        
        /* ẨN TUYỆT ĐỐI INPUT FILE TRÊN IPHONE */
        input[type="file"] {
            position: absolute;
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            z-index: -1;
        }

        .upload-btn{font-size:10px;color:var(--accent);cursor:pointer;font-weight:700;background:var(--bg-glass);padding:2px 7px;border-radius:5px;border:1px solid var(--border-color);transition:background .2s;white-space:nowrap;user-select:none}
        .controls{display:flex;gap:7px;padding:14px 18px;flex-wrap:wrap;align-items:center;background:var(--bg-controls);border-bottom:1px solid var(--border-color)}
        .btn{padding:8px 13px;cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:12px;font-family:'Be Vietnam Pro',sans-serif;display:inline-flex;align-items:center;gap:5px;min-height:36px;transition:transform .1s}
        .btn:active{transform:scale(0.95)}

        table{width:100%;border-collapse:collapse;min-width:1159px;table-layout:fixed}
        thead tr th{background:var(--bg-table-head);color:var(--color-text);font-size:10px;font-weight:700;text-transform:uppercase;padding:11px 7px;border-bottom:2px solid;border-right:1px solid;border-color:#ff0000;animation:borderRainbow 3s linear infinite}
        @keyframes borderRainbow{
            0%{border-color:#ff0000}50%{border-color:#0088ff}100%{border-color:#ff0000}
        }
        .data-row td{padding:7px 5px;border-bottom:1px solid;border-right:1px solid;border-color:#ff0000;font-size:13px;color:var(--color-text);background:var(--bg-table-row);vertical-align:middle;animation:borderRainbow 3s linear infinite}
        .col-stt{width:40px;text-align:center;font-weight:800;color:var(--accent)!important}
        .col-final{font-weight:800;color:#cc0000!important;background:rgba(255,60,80,0.05)!important}
        input{width:100%;border:none;text-align:center;font-size:13px;font-family:'Be Vietnam Pro',sans-serif;outline:none;background:transparent;color:var(--color-text)}
        
        /* FOOTER */
        tfoot tr td{color:var(--color-text);border-top:1px solid;border-bottom:1px solid;border-right:1px solid;border-color:#ff0000;padding:11px 13px;animation:borderRainbow 3s linear infinite}
        .footer-kwh-row{display:flex;align-items:center;flex-wrap:wrap;gap:14px;font-size:13px;font-weight:600}
        .loss-summary td{background:var(--bg-loss)!important;color:var(--color-loss-text)!important;font-size:13px;font-weight:600}
        .grand-total-row td{text-align:center;padding:22px!important;background:var(--bg-glass)!important}
        #lblGrandTotal{font-family:'Orbitron',monospace;color:#cc0000;font-weight:900;font-size:clamp(26px,4vw,38px);display:block}

        /* SETTINGS */
        #settingsPanel{position:fixed;bottom:20px;right:16px;z-index:10001}
        #gearBtn{width:52px;height:52px;border-radius:50%;cursor:pointer;background:var(--bg-card);border:2px solid var(--border-accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px}
        
        /* MODAL */
        #imgModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:20000;justify-content:center;align-items:center}
        #imgModal img{max-width:90%;max-height:90%;border-radius:10px}
    </style>
</head>
<body id="mainBody" class="theme-1">

<div id="settingsPanel">
    <div id="gearBtn" onclick="toggleSettingsPanel()">⚙️</div>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>

<div class="app-wrapper">
<div class="rainbow-wrapper" id="rainbowWrapper">
<div class="rb-spin"></div><div class="rb-inner"></div>
<div class="main-card" id="captureArea">
    <div class="header-banner">
        <span style="font-size:32px">⚡</span>
        <div class="header-title">SỔ QUẢN LÝ MUA BÁN ĐIỆN</div>
        <div id="displayMonthTag" style="color:var(--accent);font-weight:700;margin-top:5px">THÁNG --/----</div>
    </div>

    <div class="controls" id="controlsBar">
        <input type="month" id="currentMonth" onchange="init()" style="width:150px;background:var(--bg-glass);border-radius:8px;padding:5px;font-weight:700;color:var(--accent)">
        <div style="margin-left:auto;display:flex;gap:5px">
            <button class="btn" onclick="addRow()" style="background:linear-gradient(135deg,#1a8a35,#28a745);color:white">➕ Thêm Hộ</button>
            <button class="btn" onclick="saveToLocal()" style="background:linear-gradient(135deg,#0056b3,#007bff);color:white">💾 Lưu</button>
            <button class="btn" onclick="exportToPNG()" style="background:linear-gradient(135deg,#a0186d,#d63384);color:white">📸 Xuất Ảnh</button>
        </div>
    </div>

    <div style="overflow-x:auto;padding:15px">
        <table id="mainTable">
            <colgroup>
                <col style="width:44px"><col style="width:171px"><col style="width:70px">
                <col style="width:110px"><col style="width:110px"><col style="width:110px">
                <col style="width:115px"><col style="width:115px"><col style="width:150px"><col style="width:155px">
            </colgroup>
            <thead>
                <tr>
                    <th class="col-stt">STT</th><th>Tên hộ</th><th>Ảnh ĐH</th>
                    <th>SĐ trước</th><th>SĐ này</th><th>Số kí (kWh)</th>
                    <th>Giá (VNĐ)</th><th>Tiền (VNĐ)</th><th>Thất thoát (VNĐ)</th>
                    <th class="col-final">TỔNG NỘP</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr><td colspan="10">
                    <div class="footer-kwh-row">
                        <span>📊 Số ĐH tổng tháng: 
                            <input type="number" id="tongDHThang" oninput="updateTotals()" style="width:100px;border-bottom:1px solid var(--accent);font-weight:800"> (kWh)
                        </span>
                        <div class="img-container" style="flex-direction:row;gap:10px">
                            <span style="font-size:11px;color:var(--color-text-dim)">📷 Ảnh Tổng:</span>
                            <!-- Ảnh tổng tháng -->
                            <img id="mainMeterImg" class="img-preview" onclick="openImg(this.src)">
                            <span class="upload-btn" onclick="document.getElementById('fileMain').click()">Up Ảnh</span>
                            <span class="upload-btn" id="deleteMainImgBtn" style="display:none;color:#ff6b6b" onclick="clearMainImg()">🗑 Xóa</span>
                            <!-- Input ẩn triệt để -->
                            <input type="file" id="fileMain" accept="image/*" onchange="previewImg(this,'mainMeterImg')">
                        </div>
                    </div>
                </td></tr>
                <tr class="loss-summary">
                    <td colspan="3">⚡ Tổng các hộ: <span id="lblTotalKwh">0</span> kWh</td>
                    <td colspan="3">🔌 Điện tổng tiêu thụ: <span id="lblMainConsumption">0</span> kWh</td>
                    <td colspan="4">⚠️ Thất thoát: <span id="lblLossKwh" style="color:#cc0000;font-weight:800">0</span> kWh</td>
                </tr>
                <tr class="grand-total-row"><td colspan="10">
                    <div style="font-size:12px;color:var(--color-text-dim)">🏆 TỔNG TIỀN PHẢI NỘP TRONG THÁNG</div>
                    <span id="lblGrandTotal">0đ</span>
                </td></tr>
            </tfoot>
        </table>
    </div>
</div>
</div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('electricDB_vPhoto')) || {};
const monthInput = document.getElementById('currentMonth');
if(!monthInput.value) monthInput.value = new Date().toISOString().substring(0,7);

function init(){
    const m = monthInput.value;
    const parts = m.split('-');
    document.getElementById('displayMonthTag').innerText = 'THÁNG ' + parts[1] + '/' + parts[0];
    
    const data = db[m];
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = '';
    
    if(data?.rows) {
        data.rows.forEach(r => addRow(r));
    } else {
        addRow();
    }
    
    document.getElementById('tongDHThang').value = data?.tongDH || 0;
    
    // Xử lý ảnh tổng
    const mi = document.getElementById('mainMeterImg');
    const delBtn = document.getElementById('deleteMainImgBtn');
    if(data?.mainMeterImg && data.mainMeterImg.startsWith('data:image')){
        mi.src = data.mainMeterImg;
        mi.classList.add('has-src');
        delBtn.style.display = 'inline-block';
    } else {
        mi.src = '';
        mi.classList.remove('has-src');
        delBtn.style.display = 'none';
    }
    updateTotals();
}

function addRow(data={name:'',before:0,after:0,price:2400,img:''}){
    const row = document.getElementById('tableBody').insertRow();
    row.className = 'data-row';
    const isImg = (data.img && data.img.startsWith('data:image'));
    row.innerHTML = `
        <td class="col-stt">1</td>
        <td><input type="text" value="${data.name||''}" placeholder="Tên hộ..."></td>
        <td class="col-img">
            <div class="img-container">
                <img src="${data.img||''}" class="img-preview ${isImg?'has-src':''}" onclick="openImg(this.src)">
                <span class="upload-btn" onclick="this.nextElementSibling.nextElementSibling.click()">Up Ảnh</span>
                <span class="upload-btn" style="display:${isImg?'inline-block':'none'};color:#ff6b6b" onclick="clearRowImg(this)">🗑</span>
                <input type="file" accept="image/*" onchange="previewImg(this)">
            </div>
        </td>
        <td><input type="number" class="before" value="${data.before||0}" oninput="updateTotals()"></td>
        <td><input type="number" class="after" value="${data.after||0}" oninput="updateTotals()"></td>
        <td><input type="number" class="usage" readonly></td>
        <td><input type="number" class="price" value="${data.price||2400}" oninput="updateTotals()"></td>
        <td style="text-align:center"><span class="base-money">0</span></td>
        <td style="text-align:center"><span class="loss-share">0</span></td>
        <td class="col-final" style="text-align:center"><span class="final-total">0đ</span></td>`;
}

function previewImg(input, tid){
    if(!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            const c = document.createElement('canvas'), ctx = c.getContext('2d'), mw = 400;
            c.width = mw; c.height = img.height * (mw/img.width);
            ctx.drawImage(img, 0, 0, c.width, c.height);
            const b64 = c.toDataURL('image/jpeg', 0.7);
            
            if(tid){
                const t = document.getElementById(tid);
                t.src = b64;
                t.classList.add('has-src');
                document.getElementById('deleteMainImgBtn').style.display = 'inline-block';
            } else {
                const el = input.parentElement.querySelector('.img-preview');
                el.src = b64;
                el.classList.add('has-src');
                input.parentElement.querySelectorAll('.upload-btn')[1].style.display = 'inline-block';
            }
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
}

function clearRowImg(btn){
    const c = btn.parentElement;
    const img = c.querySelector('.img-preview');
    img.src = '';
    img.classList.remove('has-src');
    btn.style.display = 'none';
}

function clearMainImg(){
    const mi = document.getElementById('mainMeterImg');
    mi.src = '';
    mi.classList.remove('has-src');
    document.getElementById('deleteMainImgBtn').style.display = 'none';
}

function updateTotals(){
    let tkwh = 0, tmoney = 0;
    document.querySelectorAll('.data-row').forEach((row,i) => {
        row.cells[0].innerText = i + 1;
        const b = parseFloat(row.querySelector('.before').value)||0;
        const a = parseFloat(row.querySelector('.after').value)||0;
        const p = parseFloat(row.querySelector('.price').value)||0;
        const u = Math.max(0, a - b);
        const m = u * p;
        row.querySelector('.usage').value = u;
        row.querySelector('.base-money').innerText = Math.round(m).toLocaleString();
        row.dataset.u = u; row.dataset.m = m;
        tkwh += u; tmoney += m;
    });
    
    const curT = parseFloat(document.getElementById('tongDHThang').value)||0;
    const pk = new Date(monthInput.value + '-01');
    pk.setMonth(pk.getMonth()-1);
    const prevT = db[pk.toISOString().substring(0,7)]?.tongDH || 0;
    
    const mCons = Math.max(0, curT - prevT);
    const lKwh = Math.max(0, mCons - tkwh);
    const lMoney = lKwh * 2400;
    
    document.querySelectorAll('.data-row').forEach(row => {
        const u = parseFloat(row.dataset.u)||0;
        const m = parseFloat(row.dataset.m)||0;
        const s = tkwh > 0 ? (u/tkwh) * lMoney : 0;
        row.querySelector('.loss-share').innerText = Math.round(s).toLocaleString();
        row.querySelector('.final-total').innerText = (Math.round((m+s)/1000)*1000).toLocaleString() + 'đ';
    });
    
    document.getElementById('lblTotalKwh').innerText = tkwh;
    document.getElementById('lblMainConsumption').innerText = mCons;
    document.getElementById('lblLossKwh').innerText = lKwh;
    document.getElementById('lblGrandTotal').innerText = Math.round(tmoney + lMoney).toLocaleString() + 'đ';
}

function saveToLocal(){
    const rows = [];
    document.querySelectorAll('.data-row').forEach(row => {
        rows.push({
            name: row.querySelector('input[type="text"]').value,
            img: row.querySelector('.img-preview').src,
            before: row.querySelector('.before').value,
            after: row.querySelector('.after').value,
            price: row.querySelector('.price').value
        });
    });
    const m = monthInput.value;
    db[m] = {
        rows,
        tongDH: document.getElementById('tongDHThang').value,
        mainMeterImg: document.getElementById('mainMeterImg').src
    };
    localStorage.setItem('electricDB_vPhoto', JSON.stringify(db));
    alert('Đã lưu!');
}

function openImg(s){ if(s.startsWith('data:image')){ document.getElementById('modalImg').src=s; document.getElementById('imgModal').style.display='flex'; } }
function toggleSettingsPanel(){ alert('Tính năng theme đang cập nhật!'); }

init();
</script>
