<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Điện - EVN Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0b0f1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Font hỗ trợ tiếng Việt 100% -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* GIỮ NGUYÊN TOÀN BỘ CSS THEME TỪ 1 ĐẾN 14 CỦA BẠN */
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body.theme-1 {
            --bg-page: #060a18; --bg-card: rgba(15,20,45,0.97); --bg-glass: rgba(255,255,255,0.04); --bg-glass-hover: rgba(255,255,255,0.07);
            --bg-header: linear-gradient(135deg, rgba(0,80,200,0.25), rgba(0,180,255,0.12)); --bg-controls: rgba(8,12,30,0.9);
            --bg-table-head: rgba(0,100,220,0.15); --bg-table-row: rgba(255,255,255,0.025); --bg-table-row-alt: rgba(0,100,255,0.05);
            --bg-loss: rgba(255,200,50,0.07); --accent: #00b4ff; --accent2: #7c3aed; --accent-glow: rgba(0,180,255,0.35);
            --color-title: #00d4ff; --color-final: #ff4466; --color-grand: #ff3355; --color-text: #c8d8f0;
            --color-text-dim: rgba(200,216,240,0.5); --color-loss-text: #fbbf24; --border-color: rgba(0,180,255,0.18);
            --border-accent: rgba(0,180,255,0.45); --gradient-border: linear-gradient(135deg, #00b4ff, #7c3aed, #ff4466, #00b4ff);
        }
        /* ... Các theme khác giữ nguyên ... */
        body.theme-2 { --bg-page: #eef2ff; --bg-card: rgba(255,255,255,0.98); --bg-glass: rgba(26,92,184,0.05); --bg-glass-hover: rgba(26,92,184,0.09); --bg-header: linear-gradient(135deg, rgba(26,92,184,0.1), rgba(86,180,224,0.06)); --bg-controls: rgba(235,242,255,0.95); --bg-table-head: rgba(26,92,184,0.08); --bg-table-row: rgba(255,255,255,0.85); --bg-table-row-alt: rgba(235,245,255,0.85); --bg-loss: rgba(255,240,180,0.5); --accent: #1a5cb8; --accent2: #2980b9; --accent-glow: rgba(26,92,184,0.25); --color-title: #1a5cb8; --color-final: #c0000a; --color-grand: #c0000a; --color-text: #1a2a4a; --color-text-dim: rgba(26,42,74,0.5); --color-loss-text: #7a5900; --border-color: rgba(26,92,184,0.15); --border-accent: rgba(26,92,184,0.4); --gradient-border: linear-gradient(135deg, #1a5cb8, #56b4e0, #2980b9, #1a5cb8); }
        body.theme-3 { --bg-page: #020d05; --bg-card: rgba(4,18,8,0.97); --bg-glass: rgba(0,255,100,0.04); --bg-glass-hover: rgba(0,255,100,0.08); --bg-header: linear-gradient(135deg, rgba(0,180,50,0.18), rgba(0,255,100,0.07)); --bg-controls: rgba(3,14,6,0.9); --bg-table-head: rgba(0,200,80,0.1); --bg-table-row: rgba(0,255,80,0.025); --bg-table-row-alt: rgba(0,200,60,0.055); --bg-loss: rgba(0,200,80,0.07); --accent: #00e676; --accent2: #69f0ae; --accent-glow: rgba(0,230,118,0.35); --color-title: #00e676; --color-final: #69f0ae; --color-grand: #00e676; --color-text: #b0f0c8; --color-text-dim: rgba(176,240,200,0.5); --color-loss-text: #69f0ae; --border-color: rgba(0,200,80,0.18); --border-accent: rgba(0,230,118,0.45); --gradient-border: linear-gradient(135deg, #00e676, #69f0ae, #00c853, #00e676); }
        /* Tóm lược để tiết kiệm không gian, các theme 4-14 giữ như cũ của bạn */

        body { background: var(--bg-page); min-height: 100vh; display: flex; justify-content: center; padding: 20px 10px 40px; font-family: 'Be Vietnam Pro', sans-serif; transition: background 0.5s; }

        .rainbow-wrapper { position: relative; padding: 3px; border-radius: 20px; overflow: hidden; }
        .rainbow-wrapper::before { content: ''; position: absolute; width: 250%; height: 250%; top: -75%; left: -75%; background: conic-gradient(#ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#4b0082,#8b00ff,#ff0000); animation: rotateRainbow 4s linear infinite; z-index: 0; }
        @keyframes rotateRainbow { 100% { transform: rotate(360deg); } }
        .main-card { background: var(--bg-card); border-radius: 18px; position: relative; z-index: 1; overflow: hidden; }

        .header-banner { background: var(--bg-header); border-bottom: 1px solid var(--border-color); padding: 24px 28px 20px; text-align: center; }
        /* Sửa lỗi font tiêu đề Tiếng Việt */
        .header-title { font-family: 'Be Vietnam Pro', sans-serif; font-size: clamp(16px, 2.5vw, 24px); font-weight: 900; color: var(--color-title); text-shadow: 0 0 20px var(--accent-glow); text-transform: uppercase; }

        /* Style cho Modal Login & Đổi mật khẩu */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 40000; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .auth-box { background: var(--bg-card); border: 2px solid var(--border-accent); border-radius: 24px; padding: 32px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; font-family: inherit; text-align: center; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 800; cursor: pointer; }
        
        #lblGrandTotal { font-family: 'Orbitron', 'Be Vietnam Pro', sans-serif; font-weight: 900; color: #ff2244; }

        /* Animation cho Popup Thành công */
        @keyframes sp-icon { from{transform:scale(0) rotate(-30deg)} to{transform:scale(1) rotate(0)} }
    </style>
</head>
<body id="mainBody">

<!-- ====== MODAL ĐĂNG NHẬP ====== -->
<div id="loginModal" class="modal-overlay">
    <div class="auth-box">
        <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
        <div class="header-title" style="font-size: 18px; margin-bottom: 20px;">Xác thực Quản trị</div>
        <input type="password" id="loginPassInput" class="auth-input" placeholder="Nhập mật khẩu...">
        <div id="loginError" style="color: #ff4466; font-size: 12px; margin-bottom: 10px;"></div>
        <button class="auth-btn" onclick="doLogin()">ĐĂNG NHẬP</button>
        <button onclick="closeLoginModal()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Đóng</button>
    </div>
</div>

<!-- ====== MODAL ĐỔI MẬT KHẨU ====== -->
<div id="changePassModal" class="modal-overlay">
    <div class="auth-box">
        <div style="font-size: 40px; margin-bottom: 10px;">🔑</div>
        <div class="header-title" style="font-size: 18px; margin-bottom: 20px;">Đổi mật khẩu</div>
        <input type="password" id="oldPassInput" class="auth-input" placeholder="Mật khẩu hiện tại">
        <input type="password" id="newPassInput" class="auth-input" placeholder="Mật khẩu mới">
        <input type="password" id="confirmPassInput" class="auth-input" placeholder="Xác nhận mật khẩu mới">
        <div id="changePassError" style="color: #ff4466; font-size: 12px; margin-bottom: 10px;"></div>
        <button class="auth-btn" onclick="submitChangePassword()">LƯU MẬT KHẨU MỚI</button>
        <button onclick="closeChangePassModal()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Hủy bỏ</button>
    </div>
</div>

<!-- ====== POPUP ĐỔI MẬT KHẨU THÀNH CÔNG ====== -->
<div id="changeSuccessPopup" style="display:none; position:fixed; inset:0; z-index:50000; background:rgba(0,0,0,0.8); backdrop-filter:blur(15px); justify-content:center; align-items:center;">
    <div style="background:var(--bg-card); border:2px solid var(--border-accent); border-radius:26px; padding:40px; text-align:center; max-width:350px; width:90%; box-shadow:0 0 80px var(--accent-glow);">
        <div style="width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#00ff88,#00ccff); display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 20px; animation:sp-icon 0.5s cubic-bezier(.34,1.56,.64,1);">🛡️</div>
        <div class="header-title" style="font-size:20px; color:#00ff88; margin-bottom:10px;">Thành công!</div>
        <div style="color:var(--color-text); margin-bottom:25px; font-size:14px; line-height:1.5;">Mật khẩu quản trị đã được thay đổi. Hãy ghi nhớ mật khẩu mới của bạn.</div>
        <button onclick="document.getElementById('changeSuccessPopup').style.display='none'" class="auth-btn" style="background: #00ff88; color: #003311;">TUYỆT VỜI 👍</button>
    </div>
</div>

<div id="settingsPanel">
    <div id="settingsPopup">
        <!-- ... các phần setting khác giữ nguyên ... -->
        <div id="adminSettingsSection" style="display:none;">
            <div class="sp-label">Quản trị</div>
            <button class="sp-btn" onclick="openChangePassModal(); toggleSettingsPanel()" style="background: linear-gradient(135deg,#6f42c1,#a29bfe);">🔑 Đổi mật khẩu</button>
            <button class="sp-btn" onclick="exportData(); toggleSettingsPanel()" style="background: #17a2b8; margin-top:8px;">📤 Backup dữ liệu</button>
            <button class="sp-btn" onclick="doLogout(); toggleSettingsPanel()" style="background: #c0392b; margin-top:8px;">🚪 Đăng xuất</button>
        </div>
    </div>
    <div id="gearBtn" onclick="toggleSettingsPanel()">⚙️</div>
</div>

<!-- Cấu trúc App Wrapper (Bảng dữ liệu của bạn) -->
<div class="app-wrapper">
    <div class="rainbow-wrapper">
        <div class="main-card" id="captureArea">
            <div class="header-banner">
                <span class="header-icon">⚡</span>
                <div class="header-title">Sổ Quản Lý Mua Bán Điện</div>
                <div class="header-month-tag" id="displayMonthTag">Tháng 03/2026</div>
            </div>
            
            <div id="viewOnlyBanner" style="text-align:center; padding:10px; background:rgba(255,165,0,0.1); color:orange; font-size:12px;">
                👁️ Chế độ xem - <button onclick="openLoginModal()" style="background:orange; border:none; color:black; padding:2px 8px; border-radius:4px; font-weight:bold; cursor:pointer;">Đăng nhập Quản trị</button>
            </div>

            <!-- ... Bảng Table và các Controls giữ nguyên từ file gốc của bạn ... -->
            <div class="controls" id="controlsBar">
                <!-- Nội dung các nút Thêm hộ, Lưu, Xuất ảnh... -->
                <button class="btn admin-only" onclick="addRow()" style="display:none; background:#28a745; color:white;">➕ Thêm Hộ Mới</button>
                <button class="btn" onclick="exportToPNG()" style="background:#d63384; color:white;">📸 Xuất Ảnh</button>
            </div>
            
            <!-- Phần bảng table (Tự động render từ JS của bạn) -->
            <div id="tableScrollWrapper">
                <table id="mainTable">
                    <!-- Colgroup, Thead, Tbody, Tfoot giữ nguyên -->
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// ============================
// HỆ THỐNG MẬT KHẨU & AUTH
// ============================
const DEFAULT_HASH = '8c1d8b9f195553ff90cdb8514179d930fd177b8cc288f59edd1b023e139cfe4f'; // dien2024
let isAuthenticated = false;

async function hashText(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getStoredHash() {
    return localStorage.getItem('evn_pro_custom_hash') || DEFAULT_HASH;
}

async function doLogin() {
    const input = document.getElementById('loginPassInput');
    const hash = await hashText(input.value);
    if (hash === getStoredHash()) {
        isAuthenticated = true;
        input.value = '';
        document.getElementById('loginModal').classList.remove('show');
        applyAuthUI();
        showToast('✅ Đăng nhập thành công!');
    } else {
        document.getElementById('loginError').innerText = 'Mật khẩu không đúng!';
    }
}

function doLogout() {
    isAuthenticated = false;
    applyAuthUI();
    showToast('🚪 Đã đăng xuất');
}

function openLoginModal() { document.getElementById('loginModal').classList.add('show'); }
function closeLoginModal() { document.getElementById('loginModal').classList.remove('show'); }
function openChangePassModal() { document.getElementById('changePassModal').classList.add('show'); }
function closeChangePassModal() { document.getElementById('changePassModal').classList.remove('show'); }

async function submitChangePassword() {
    const oldPass = document.getElementById('oldPassInput').value;
    const newPass = document.getElementById('newPassInput').value;
    const confirmPass = document.getElementById('confirmPassInput').value;
    const errorEl = document.getElementById('changePassError');

    if (await hashText(oldPass) !== getStoredHash()) {
        errorEl.innerText = 'Mật khẩu hiện tại không đúng!';
        return;
    }
    if (newPass.length < 4) {
        errorEl.innerText = 'Mật khẩu mới phải từ 4 ký tự!';
        return;
    }
    if (newPass !== confirmPass) {
        errorEl.innerText = 'Xác nhận mật khẩu mới không khớp!';
        return;
    }

    // Lưu mật khẩu mới
    const newHash = await hashText(newPass);
    localStorage.setItem('evn_pro_custom_hash', newHash);
    
    // Hiển thị Popup thành công
    closeChangePassModal();
    document.getElementById('changeSuccessPopup').style.display = 'flex';
}

function applyAuthUI() {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAuthenticated ? 'inline-flex' : 'none');
    document.getElementById('adminSettingsSection').style.display = isAuthenticated ? 'block' : 'none';
    document.getElementById('viewOnlyBanner').style.display = isAuthenticated ? 'none' : 'block';
    
    // Disable inputs nếu không login
    document.querySelectorAll('input:not(#loginPassInput):not([id*="Pass"])').forEach(input => {
        input.disabled = !isAuthenticated;
    });
}

function showToast(msg) {
    // Hàm toast của bạn...
    console.log(msg);
}

// KHỞI TẠO BAN ĐẦU
window.onload = () => {
    applyAuthUI();
    // Chạy các hàm init() khác của bạn ở đây...
}

function toggleSettingsPanel() {
    const popup = document.getElementById('settingsPopup');
    popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
